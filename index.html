<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stella 的找工指挥中心</title>

  <style>
    :root {
      --bg: #f7f1e8;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-solid: #fffaf3;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: rgba(31, 41, 55, 0.10);
      --gold: #d99a2b;
      --gold-dark: #9a5f00;
      --green: #0f766e;
      --blue: #2563eb;
      --pink: #db2777;
      --shadow: 0 20px 50px rgba(73, 50, 17, 0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 201, 109, 0.45), transparent 34%),
        radial-gradient(circle at 85% 12%, rgba(255, 236, 184, 0.7), transparent 28%),
        linear-gradient(180deg, #fff8ed 0%, var(--bg) 48%, #f6efe5 100%);
      color: var(--ink);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(31, 41, 55, 0.035) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(31, 41, 55, 0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.35), transparent 70%);
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      padding: 42px 0 24px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 34px;
      padding: 34px;
      background: linear-gradient(135deg, rgba(255,255,255,0.82), rgba(255,248,237,0.62));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero::after {
      content: "✦";
      position: absolute;
      right: 34px;
      top: 24px;
      font-size: 68px;
      color: rgba(217, 154, 43, 0.22);
      transform: rotate(14deg);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(217, 154, 43, 0.12);
      color: var(--gold-dark);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      max-width: 780px;
      font-size: clamp(36px, 6vw, 68px);
      line-height: 0.95;
      letter-spacing: -2.6px;
    }

    .subtitle {
      margin: 18px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    button, .pill-button {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    button:hover, .pill-button:hover {
      transform: translateY(-2px);
    }

    .primary {
      color: white;
      background: #1f2937;
      box-shadow: 0 10px 24px rgba(31, 41, 55, 0.18);
    }

    .secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid var(--line);
    }

    main {
      padding: 8px 0 70px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 20px 0;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      background: var(--surface);
      box-shadow: 0 12px 30px rgba(73, 50, 17, 0.08);
      backdrop-filter: blur(14px);
    }

    .stat-number {
      font-size: 29px;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .stat-label {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .panel {
      position: sticky;
      top: 12px;
      z-index: 5;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 250, 243, 0.88);
      box-shadow: 0 14px 40px rgba(73, 50, 17, 0.10);
      backdrop-filter: blur(18px);
      padding: 14px;
      margin: 16px 0 20px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.5fr 0.8fr 0.8fr 0.8fr;
      gap: 10px;
    }

    input, select {
      width: 100%;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid rgba(31, 41, 55, 0.13);
      font-size: 15px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      outline: none;
    }

    input:focus, select:focus {
      border-color: rgba(217, 154, 43, 0.75);
      box-shadow: 0 0 0 4px rgba(217, 154, 43, 0.12);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }

    .chip.active {
      color: #fff;
      background: var(--ink);
      border-color: var(--ink);
    }

    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin: 22px 0 14px;
    }

    .count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 240px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.84);
      border-radius: 26px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 12px 34px rgba(73, 50, 17, 0.10);
      border: 1px solid rgba(31, 41, 55, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 54px rgba(73, 50, 17, 0.18);
      border-color: rgba(217, 154, 43, 0.42);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 6px;
      background: linear-gradient(90deg, var(--gold), #f7c948, #f97316);
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 4px;
    }

    .province {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      background: rgba(37, 99, 235, 0.10);
      color: #1d4ed8;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
    }

    .favorite {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.82);
      color: #9ca3af;
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      padding: 0;
      font-size: 18px;
      flex: none;
    }

    .favorite.on {
      color: #c27803;
      background: rgba(255, 237, 213, 0.9);
      border-color: rgba(217, 154, 43, 0.35);
    }

    .name {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.4px;
      line-height: 1.18;
      margin: 18px 0 10px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.10);
      color: var(--green);
      font-size: 12px;
      font-weight: 850;
    }

    .tag.priority {
      background: rgba(219, 39, 119, 0.10);
      color: var(--pink);
    }

    .url {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
      margin-bottom: 16px;
    }

    .card-footer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: auto;
    }

    .status {
      padding: 10px 11px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 800;
      border: 1px solid var(--line);
      background: #fff;
    }

    .open-label {
      color: #fff;
      background: var(--ink);
      border-radius: 14px;
      padding: 11px 13px;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .empty {
      text-align: center;
      border: 1px dashed rgba(31, 41, 55, 0.20);
      border-radius: 28px;
      padding: 44px;
      background: rgba(255,255,255,0.52);
      color: var(--muted);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: #1f2937;
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      transition: 0.25s ease;
      box-shadow: 0 14px 34px rgba(31, 41, 55, 0.24);
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 820px) {
      .hero {
        padding: 26px;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }

      .board-header {
        display: block;
      }

      .hint {
        margin-top: 6px;
      }
    }

    @media (max-width: 520px) {
      .shell {
        width: min(100% - 22px, 1180px);
      }

      .stats {
        grid-template-columns: 1fr;
      }

      h1 {
        letter-spacing: -1.6px;
      }
    }
  </style>
</head>

<body>
  <header class="shell">
    <section class="hero">
      <div class="eyebrow">✨ 找工淘金模式</div>
      <h1>我的求职墙：每天点进去一点点，机会就多一点点。</h1>
      <p class="subtitle">
        集中管理所有目标机构官网：搜索、筛选、收藏、标记状态、优先查看高匹配岗位入口。适合每天快速检查政府、大学、医疗、市政和公司招聘页面。
      </p>

      <div class="hero-actions">
        <button class="primary" id="randomPick">今天帮我选一个</button>
        <button class="secondary" id="showFavorites">只看收藏</button>
        <button class="secondary" id="resetAll">重置筛选</button>
      </div>
    </section>
  </header>

  <main class="shell">
    <section class="stats" aria-label="找工看板统计">
      <div class="stat">
        <div class="stat-number" id="totalStat">0</div>
        <div class="stat-label">总入口</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="provinceStat">0</div>
        <div class="stat-label">省份数</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="favoriteStat">0</div>
        <div class="stat-label">已收藏</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="appliedStat">0</div>
        <div class="stat-label">已申请</div>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="搜索机构、省份、网址或分类……" />
        <select id="provinceFilter">
          <option value="ALL">全部省份</option>
        </select>
        <select id="categoryFilter">
          <option value="ALL">全部分类</option>
        </select>
        <select id="sortBy">
          <option value="priority">按智能优先级排序</option>
          <option value="name">按机构名称 A-Z</option>
          <option value="province">按省份排序</option>
          <option value="favorite">收藏优先</option>
        </select>
      </div>

      <div class="chips" id="quickChips">
        <span class="chip active" data-keyword="">全部</span>
        <span class="chip" data-keyword="Toronto">多伦多</span>
        <span class="chip" data-keyword="大学/学院">大学</span>
        <span class="chip" data-keyword="City">城市/市政</span>
        <span class="chip" data-keyword="Health">医疗</span>
        <span class="chip" data-keyword="Public">公共部门</span>
      </div>
    </section>

    <div class="board-header">
      <div class="count" id="count"></div>
      <div class="hint">提示：⭐ 收藏重点入口；不用离开页面也能记录申请状态。</div>
    </div>

    <section class="grid" id="board"></section>
  </main>

  <div class="toast" id="toast">已保存</div>

  <script>
    let companies = [];
    let favoritesOnly = false;

    const STORAGE_KEYS = {
      favorite: "jobBoardFavorites",
      status: "jobBoardStatuses"
    };

    const categoryRules = [
      { label: "市政机构", keywords: ["city", "region", "town", "municipality", "county"] },
      { label: "省级政府", keywords: ["public service", "ontario", "bc public", "government"] },
      { label: "大学/学院", keywords: ["university", "college", "utoronto", "ubc", "sfu", "bcit"] },
      { label: "医疗健康", keywords: ["health", "hospital", "care"] },
      { label: "交通运输", keywords: ["transit", "ttc", "metrolinx", "translink"] }
    ];

    function getStorage(key) {
      try {
        return JSON.parse(localStorage.getItem(key)) || {};
      } catch {
        return {};
      }
    }

    function setStorage(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function getCategory(company) {
      const text = `${company.name} ${company.url}`.toLowerCase();
      const match = categoryRules.find(rule => rule.keywords.some(keyword => text.includes(keyword)));
      return match ? match.label : "其他机构";
    }

    function getPriority(company) {
      const text = `${company.name} ${company.url}`.toLowerCase();
      let score = 0;

      if (company.province === "ON") score += 4;
      if (text.includes("toronto")) score += 5;
      if (text.includes("public") || text.includes("government") || text.includes("city")) score += 3;
      if (text.includes("university") || text.includes("college")) score += 2;
      if (text.includes("career") || text.includes("jobs")) score += 1;

      if (score >= 8) return { label: "高度匹配", score };
      if (score >= 5) return { label: "值得关注", score };
      return { label: "可探索", score };
    }

    function getId(company) {
      return `${company.province}__${company.name}__${company.url}`.replace(/\s+/g, "_");
    }

    async function loadCSV() {
      const response = await fetch("companies.csv");
      const text = await response.text();

      const rows = text.trim().split(/\r?\n/).slice(1);

      companies = rows.map(row => {
        const columns = row.split(",");

        return {
          province: columns[0]?.trim() || "N/A",
          name: columns[1]?.trim() || "未命名机构",
          url: columns.slice(2).join(",").trim()
        };
      }).filter(company => company.url);

      companies = companies.map(company => ({
        ...company,
        category: getCategory(company),
        priority: getPriority(company)
      }));

      populateFilters();
      updateStats();
      renderBoard();
    }

    function populateFilters() {
      const provinceFilter = document.getElementById("provinceFilter");
      const categoryFilter = document.getElementById("categoryFilter");

      const provinces = [...new Set(companies.map(item => item.province))].sort();
      const categories = [...new Set(companies.map(item => item.category))].sort();

      provinces.forEach(province => {
        const option = document.createElement("option");
        option.value = province;
        option.textContent = province;
        provinceFilter.appendChild(option);
      });

      categories.forEach(category => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        categoryFilter.appendChild(option);
      });
    }

    function updateStats() {
      const favorites = getStorage(STORAGE_KEYS.favorite);
      const statuses = getStorage(STORAGE_KEYS.status);

      document.getElementById("totalStat").textContent = companies.length;
      document.getElementById("provinceStat").textContent = new Set(companies.map(item => item.province)).size;
      document.getElementById("favoriteStat").textContent = Object.values(favorites).filter(Boolean).length;
      document.getElementById("appliedStat").textContent = Object.values(statuses).filter(status => status === "已申请").length;
    }

    function getFilteredCompanies() {
      const favorites = getStorage(STORAGE_KEYS.favorite);
      const keyword = document.getElementById("searchInput").value.toLowerCase();
      const selectedProvince = document.getElementById("provinceFilter").value;
      const selectedCategory = document.getElementById("categoryFilter").value;
      const sortBy = document.getElementById("sortBy").value;

      let filtered = companies.filter(company => {
        const text = `${company.province} ${company.name} ${company.url} ${company.category} ${company.priority.label}`.toLowerCase();

        const matchesSearch = text.includes(keyword);
        const matchesProvince = selectedProvince === "ALL" || company.province === selectedProvince;
        const matchesCategory = selectedCategory === "ALL" || company.category === selectedCategory;
        const matchesFavorite = !favoritesOnly || favorites[getId(company)];

        return matchesSearch && matchesProvince && matchesCategory && matchesFavorite;
      });

      filtered.sort((a, b) => {
        if (sortBy === "name") return a.name.localeCompare(b.name);
        if (sortBy === "province") return a.province.localeCompare(b.province) || a.name.localeCompare(b.name);
        if (sortBy === "favorite") return Number(!!favorites[getId(b)]) - Number(!!favorites[getId(a)]) || a.name.localeCompare(b.name);
        return b.priority.score - a.priority.score || a.name.localeCompare(b.name);
      });

      return filtered;
    }

    function renderBoard() {
      const board = document.getElementById("board");
      const count = document.getElementById("count");
      const favorites = getStorage(STORAGE_KEYS.favorite);
      const statuses = getStorage(STORAGE_KEYS.status);
      const filtered = getFilteredCompanies();

      count.textContent = `${filtered.length} 个机构符合条件`;

      board.innerHTML = "";

      if (!filtered.length) {
        board.innerHTML = `<div class="empty">暂时没有匹配的招聘入口。可以换个关键词，或点击“重置筛选”。</div>`;
        return;
      }

      filtered.forEach(company => {
        const id = getId(company);
        const isFavorite = !!favorites[id];
        const status = statuses[id] || "未查看";

        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
          <div class="topline">
            <span class="province">📍 ${company.province}</span>
            <button class="favorite ${isFavorite ? "on" : ""}" title="收藏这个入口" data-action="favorite">★</button>
          </div>

          <div class="name">${company.name}</div>

          <div class="meta">
            <span class="tag">${company.category}</span>
            <span class="tag priority">${company.priority.label}</span>
          </div>

          <div class="url">${company.url}</div>

          <div class="card-footer">
            <select class="status" data-action="status" aria-label="申请状态">
              ${["未查看", "今天查看", "已保存岗位", "已申请", "暂不匹配"].map(option =>
                `<option value="${option}" ${option === status ? "selected" : ""}>${option}</option>`
              ).join("")}
            </select>
            <a class="open-label" href="${company.url}" target="_blank" rel="noopener noreferrer">打开 ↗</a>
          </div>
        `;

        card.querySelector('[data-action="favorite"]').addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();

          const current = getStorage(STORAGE_KEYS.favorite);
          current[id] = !current[id];

          if (!current[id]) delete current[id];

          setStorage(STORAGE_KEYS.favorite, current);
          showToast(current[id] ? "已加入收藏" : "已取消收藏");
          updateStats();
          renderBoard();
        });

        card.querySelector('[data-action="status"]').addEventListener("change", event => {
          const current = getStorage(STORAGE_KEYS.status);
          current[id] = event.target.value;
          setStorage(STORAGE_KEYS.status, current);
          showToast(`状态已保存：${event.target.value}`);
          updateStats();
        });

        board.appendChild(card);
      });
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 1400);
    }

    function resetFilters() {
      favoritesOnly = false;
      document.getElementById("searchInput").value = "";
      document.getElementById("provinceFilter").value = "ALL";
      document.getElementById("categoryFilter").value = "ALL";
      document.getElementById("sortBy").value = "priority";

      document.querySelectorAll(".chip").forEach(chip => chip.classList.remove("active"));
      document.querySelector('.chip[data-keyword=""]').classList.add("active");

      renderBoard();
    }

    document.getElementById("searchInput").addEventListener("input", renderBoard);
    document.getElementById("provinceFilter").addEventListener("change", renderBoard);
    document.getElementById("categoryFilter").addEventListener("change", renderBoard);
    document.getElementById("sortBy").addEventListener("change", renderBoard);

    document.getElementById("resetAll").addEventListener("click", resetFilters);

    document.getElementById("showFavorites").addEventListener("click", () => {
      favoritesOnly = !favoritesOnly;
      document.getElementById("showFavorites").textContent = favoritesOnly ? "查看全部" : "只看收藏";
      renderBoard();
    });

    document.getElementById("randomPick").addEventListener("click", () => {
      const filtered = getFilteredCompanies();
      if (!filtered.length) return showToast("没有可选择的入口");

      const choice = filtered[Math.floor(Math.random() * filtered.length)];
      document.getElementById("searchInput").value = choice.name;
      showToast(`今天推荐：${choice.name}`);
      renderBoard();
    });

    document.getElementById("quickChips").addEventListener("click", event => {
      const chip = event.target.closest(".chip");
      if (!chip) return;

      document.querySelectorAll(".chip").forEach(item => item.classList.remove("active"));
      chip.classList.add("active");

      document.getElementById("searchInput").value = chip.dataset.keyword;
      renderBoard();
    });

    loadCSV().catch(error => {
      document.getElementById("board").innerHTML = `
        <div class="empty">
          无法加载 companies.csv。请确认 index.html 和 companies.csv 在同一个文件夹里。
        </div>
      `;
      console.error(error);
    });
  </script>
</body>
</html>
