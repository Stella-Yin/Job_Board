<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Job Board</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f4ef;
      color: #1f2933;
    }

    header {
      padding: 36px 24px 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      margin-top: 8px;
      color: #6b7280;
      font-size: 15px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 24px 60px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      background: white;
    }

    input {
      flex: 1;
      min-width: 240px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.04);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 32px rgba(0,0,0,0.1);
    }

    .province {
      display: inline-block;
      padding: 5px 10px;
      background: #eef2ff;
      color: #4338ca;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .name {
      font-size: 20px;
      font-weight: 750;
      margin-bottom: 12px;
    }

    .url {
      font-size: 13px;
      color: #6b7280;
      word-break: break-all;
      line-height: 1.4;
    }

    .count {
      margin-bottom: 16px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <header>
    <h1>My Job Application Board</h1>
    <div class="subtitle">Click any organization to open its official career page.</div>
  </header>

  <main class="container">
    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="Search organization, province, or URL..." />
      <select id="provinceFilter">
        <option value="ALL">All Provinces</option>
      </select>
    </div>

    <div class="count" id="count"></div>
    <div class="grid" id="board"></div>
  </main>

  <script>
    let companies = [];

    async function loadCSV() {
      const response = await fetch("companies.csv");
      const text = await response.text();

      const rows = text.trim().split("\n").slice(1);

      companies = rows.map(row => {
        const columns = row.split(",");

        return {
          province: columns[0]?.trim(),
          name: columns[1]?.trim(),
          url: columns.slice(2).join(",").trim()
        };
      });

      populateProvinceFilter();
      renderBoard();
    }

    function populateProvinceFilter() {
      const provinceFilter = document.getElementById("provinceFilter");
      const provinces = [...new Set(companies.map(item => item.province))].sort();

      provinces.forEach(province => {
        const option = document.createElement("option");
        option.value = province;
        option.textContent = province;
        provinceFilter.appendChild(option);
      });
    }

    function renderBoard() {
      const board = document.getElementById("board");
      const count = document.getElementById("count");
      const keyword = document.getElementById("searchInput").value.toLowerCase();
      const selectedProvince = document.getElementById("provinceFilter").value;

      const filtered = companies.filter(company => {
        const matchesSearch =
          company.province.toLowerCase().includes(keyword) ||
          company.name.toLowerCase().includes(keyword) ||
          company.url.toLowerCase().includes(keyword);

        const matchesProvince =
          selectedProvince === "ALL" || company.province === selectedProvince;

        return matchesSearch && matchesProvince;
      });

      count.textContent = `${filtered.length} organizations found`;

      board.innerHTML = "";

      filtered.forEach(company => {
        const card = document.createElement("a");
        card.className = "card";
        card.href = company.url;
        card.target = "_blank";

        card.innerHTML = `
          <div class="province">${company.province}</div>
          <div class="name">${company.name}</div>
          <div class="url">${company.url}</div>
        `;

        board.appendChild(card);
      });
    }

    document.getElementById("searchInput").addEventListener("input", renderBoard);
    document.getElementById("provinceFilter").addEventListener("change", renderBoard);

    loadCSV();
  </script>
</body>
</html>
